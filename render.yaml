services:
  - type: web
    name: stream-on
    env: node
    plan: starter
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: NODE_ENV
        value: production
    autoDeploy: true
